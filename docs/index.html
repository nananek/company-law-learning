<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会社法条文マップ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1 id="site-title">会社法条文マップ</h1>
      <div class="view-tabs">
        <button class="view-tab active" data-view="structure">条文構造</button>
        <button class="view-tab" data-view="topics">論点別</button>
      </div>
    </div>
    <div class="header-right">
      <div class="search-wrapper">
        <input type="text" id="search-input" placeholder="条文番号・キーワードで検索..." autocomplete="off">
        <div id="search-results" class="search-results hidden"></div>
      </div>
    </div>
  </header>

  <nav id="breadcrumb">
    <ol id="breadcrumb-list">
      <li><a href="#/" data-id="root">会社法</a></li>
    </ol>
  </nav>

  <main id="main">
    <div id="map-container"></div>
    <aside id="article-panel" class="hidden">
      <div class="panel-header">
        <button id="panel-close" aria-label="閉じる">&times;</button>
        <h2 id="panel-title"></h2>
        <p id="panel-caption"></p>
      </div>
      <div id="panel-body"></div>
    </aside>
  </main>

  <script src="lib/fuse.min.js"></script>
  <script src="js/map.js"></script>
  <script src="js/topics.js"></script>
  <script src="js/article-panel.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
